# Run `cargo deny check` to lint the dependency graph for security advisories,
# disallowed licenses, banned crates, and untrusted sources.

[advisories]
# RustSec advisory database (https://github.com/rustsec/advisory-db).
ignore = [
    # paste is unmaintained and archived. Pulled in only transitively
    # (glfw -> image -> ravif -> rav1e, and rapier3d -> simba); there is no
    # direct dependency and no fix until those upstreams drop it.
    "RUSTSEC-2024-0436",
    # ttf-parser is unmaintained. Pulled in only transitively (fontdue ->
    # ttf-parser, fontdue being the cook-time glyph rasterizer); the advisory
    # lists no safe upgrade. The maintained alternative (skrifa) would require
    # fontdue to switch or replacing fontdue outright. Revisit if fontdue moves
    # off ttf-parser.
    "RUSTSEC-2026-0192",
]

[licenses]
# Permissive licenses allowed across the whole graph. Every SPDX id here was
# observed in the current dependency tree via `cargo deny list`.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unlicense",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "NCSA",
    # MPL-2.0 is weak, file-level copyleft: only modifications to the MPL
    # source files themselves must be published. Linking these crates
    # unmodified into a proprietary binary carries no obligation on our own
    # code. Carried by the symphonia audio decoders (via kira), cbindgen
    # (build-dependency only), option-ext, and triple_buffer.
    "MPL-2.0",
]
# r-efi is `MIT OR Apache-2.0 OR LGPL-2.1-or-later`; allowing MIT and
# Apache-2.0 satisfies it without invoking the LGPL option, so LGPL is
# deliberately absent. A future LGPL-only crate will fail this check loudly.
confidence-threshold = 0.8

[bans]
# The windows-* and rand/getrandom ecosystems legitimately resolve to several
# versions at once, so duplicate versions are a warning, not a hard error.
multiple-versions = "warn"
# No registry dependency may use a "*" version requirement. Internal workspace
# crates depend on each other by `path` without a version, which counts as a
# wildcard; allow-wildcard-paths exempts those because every crate that carries
# such a path dependency is marked `publish = false`.
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
